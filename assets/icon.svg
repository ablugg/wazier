<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Outer lens glow -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Main lens body -->
    <radialGradient id="lensBody" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#0a1a0f"/>
      <stop offset="60%"  stop-color="#050e08"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Iris gradient — deep green rings -->
    <radialGradient id="iris" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#001a08"/>
      <stop offset="35%"  stop-color="#003318"/>
      <stop offset="65%"  stop-color="#001a08"/>
      <stop offset="100%" stop-color="#000a04"/>
    </radialGradient>

    <!-- Core pupil glow -->
    <radialGradient id="pupil" cx="50%" cy="42%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="12%"  stop-color="#aaffcc"/>
      <stop offset="30%"  stop-color="#00ff88"/>
      <stop offset="55%"  stop-color="#00cc55"/>
      <stop offset="80%"  stop-color="#005522"/>
      <stop offset="100%" stop-color="#001a08"/>
    </radialGradient>

    <!-- Lens reflection highlight -->
    <radialGradient id="reflection" cx="38%" cy="32%" r="40%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Bezel gradient -->
    <linearGradient id="bezel" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="40%"  stop-color="#111111"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <!-- Green ambient filter -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="circle">
      <circle cx="512" cy="512" r="480"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Outer ambient glow -->
  <circle cx="512" cy="512" r="500" fill="url(#outerGlow)"/>

  <!-- Bezel ring -->
  <circle cx="512" cy="512" r="480" fill="url(#bezel)"/>

  <!-- Bezel inner edge highlight -->
  <circle cx="512" cy="512" r="476" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="512" cy="512" r="462" fill="none" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Lens housing -->
  <circle cx="512" cy="512" r="455" fill="url(#lensBody)" clip-path="url(#circle)"/>

  <!-- Outer ring grooves -->
  <circle cx="512" cy="512" r="430" fill="none" stroke="#0d1f12" stroke-width="8"/>
  <circle cx="512" cy="512" r="410" fill="none" stroke="#091508" stroke-width="5"/>
  <circle cx="512" cy="512" r="388" fill="none" stroke="#0d1f12" stroke-width="4"/>

  <!-- Iris body -->
  <circle cx="512" cy="512" r="370" fill="url(#iris)"/>

  <!-- Iris ring details -->
  <circle cx="512" cy="512" r="365" fill="none" stroke="#004422" stroke-width="3" opacity="0.6"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#003318" stroke-width="6" opacity="0.5"/>
  <circle cx="512" cy="512" r="310" fill="none" stroke="#004422" stroke-width="4" opacity="0.4"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="#002211" stroke-width="8" opacity="0.5"/>
  <circle cx="512" cy="512" r="245" fill="none" stroke="#003318" stroke-width="5" opacity="0.4"/>

  <!-- Pupil core -->
  <circle cx="512" cy="512" r="210" fill="url(#pupil)" filter="url(#softGlow)"/>

  <!-- Inner pupil glow rings -->
  <circle cx="512" cy="512" r="160" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.5"/>

  <!-- Bright center core -->
  <circle cx="512" cy="504" r="72" fill="#00ff88" filter="url(#greenGlow)" opacity="0.95"/>
  <circle cx="512" cy="504" r="44" fill="#88ffcc"/>
  <circle cx="512" cy="504" r="22" fill="#ffffff"/>

  <!-- Lens reflection -->
  <ellipse cx="430" cy="400" rx="90" ry="60" fill="url(#reflection)" transform="rotate(-20 430 400)"/>
  <ellipse cx="390" cy="370" rx="30" ry="18" fill="#ffffff" opacity="0.06"/>

  <!-- Subtle outer bezel rim light -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.12"/>
</svg>
